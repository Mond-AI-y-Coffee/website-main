- question: "Do I need to RSVP or register?"
  answer: "No. Just show up."
  answer_link: "/get-involved/"
- question: "Is it free?"
  answer: "Yes, coffee and conversation are both free."
- question: "Do I need to be a developer or AI expert to attend?"
  answer: "No, we're all just trying to figure it out these days. Come and learn!"
- question: "Can I present my work?"
  answer: "Come to a meeting first. See if it's something you're interested in. If you are, we can talk there."
- question: "What about parking?"
  answer: "Like most of Midtown, parking ain't free. There's plenty of street parking at 8:30am on a Monday. The Midtown MARTA station is also a couple blocks away."
- question: "How long has this been going on?"
  answer: "We've been meeting weekly since 2025."
