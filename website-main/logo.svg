<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="400" fill="#1e1208"/>
  
  <!-- Steam wisps -->
  <path d="M148 118 Q152 100 148 85" fill="none" stroke="#c8750a" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <path d="M200 112 Q205 92 200 75" fill="none" stroke="#c8750a" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <path d="M252 118 Q248 100 252 85" fill="none" stroke="#c8750a" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

  <!-- Cup body -->
  <path d="M110 140 L130 280 Q132 295 150 295 L250 295 Q268 295 270 280 L290 140 Z" fill="#3b2010" stroke="#c8750a" stroke-width="2"/>
  
  <!-- Cup lip -->
  <ellipse cx="200" cy="140" rx="90" ry="14" fill="#3b2010" stroke="#c8750a" stroke-width="2"/>
  
  <!-- Coffee surface -->
  <ellipse cx="200" cy="140" rx="84" ry="10" fill="#1e1208"/>
  
  <!-- Handle -->
  <path d="M270 175 Q320 175 320 210 Q320 245 270 245" fill="none" stroke="#c8750a" stroke-width="12" stroke-linecap="round"/>
  <path d="M270 175 Q308 175 308 210 Q308 245 270 245" fill="none" stroke="#3b2010" stroke-width="6" stroke-linecap="round"/>

  <!-- (AI) text on cup -->
  <text x="200" y="230" text-anchor="middle" dominant-baseline="central"
    font-family="'Cooper Black', 'Rockwell Extra Bold', Georgia, serif"
    font-size="38" fill="#e8a020" letter-spacing="-1">(AI)</text>

  <!-- Saucer -->
  <ellipse cx="200" cy="308" rx="115" ry="14" fill="#3b2010" stroke="#c8750a" stroke-width="1.5"/>
  <ellipse cx="200" cy="306" rx="100" ry="9" fill="#1e1208" opacity="0.5"/>

  <!-- Wordmark -->
  <text x="200" y="356" text-anchor="middle" dominant-baseline="central"
    font-family="'Cooper Black', 'Rockwell Extra Bold', Georgia, serif"
    font-size="19" fill="#f5f0e8" letter-spacing="1">MOND<tspan fill="#c8750a">(AI)</tspan>Y COFFEE</text>
</svg>
